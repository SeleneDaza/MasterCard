services:
  mastercard-service:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://mc_user:mc123@mastercard-db:5432/mastercard_db
    depends_on:
      mastercard-db:
        condition: service_healthy

  mastercard-db:
    image: postgres
    environment:
      - POSTGRES_USER=mc_user
      - POSTGRES_PASSWORD=mc123
      - POSTGRES_DB=mastercard_db
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc_user -d mastercard_db"]
      interval: 5s
      timeout: 5s
      retries: 5